<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal Startpage</title>

    <!-- 终端风格主题色 -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- 等宽字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100vh;
        overflow: hidden;
        background-color: #0a0a0a;
        color: #e5e7eb;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        -webkit-user-select: none; user-select: none;
      }
      #root { width: 100%; height: 100vh; }

      /* 隐藏滚动条但保持功能 */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
      ::-webkit-scrollbar-thumb { background: rgba(0, 255, 0, 0.3); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 0, 0.5); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <link rel="stylesheet" href="./assets/index.css" />
    <script type="module" src="./assets/index.js"></script>
  </body>
</html>
